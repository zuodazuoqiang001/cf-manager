services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    restart: unless-stopped
    network_mode: bridge
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - API_SECRET=${API_SECRET:-}
      - PROXY_URL=${PROXY_URL:-}
      - DB_PATH=/app/data/cf-manager.db
    volumes:
      - cf-data:/app/data

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - BASE_URL=${BASE_URL:-/}
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "${APP_PORT:-3000}:80"
    environment:
      - BASE_URL=${BASE_URL:-/}
    depends_on:
      - backend

volumes:
  cf-data:
    driver: local
